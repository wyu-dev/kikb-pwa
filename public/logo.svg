<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1929;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ca8a04;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#fde047" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Building/cooperative icon -->
  <rect x="72" y="110" width="56" height="35" rx="2" fill="url(#goldGrad)"/>
  <rect x="80" y="100" width="40" height="14" rx="2" fill="url(#goldGrad)"/>
  <polygon points="100,72 124,100 76,100" fill="#fde047"/>
  <!-- Windows -->
  <rect x="82" y="115" width="10" height="12" rx="1" fill="#1e3a5f"/>
  <rect x="95" y="115" width="10" height="12" rx="1" fill="#1e3a5f"/>
  <rect x="108" y="115" width="10" height="12" rx="1" fill="#1e3a5f"/>
  <!-- Flag on top -->
  <line x1="100" y1="72" x2="100" y2="58" stroke="#fde047" stroke-width="2"/>
  <polygon points="100,58 112,63 100,68" fill="#fde047"/>
  <!-- Text KIKB -->
  <text x="100" y="162" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fde047" text-anchor="middle" letter-spacing="3">KIKB</text>
</svg>
